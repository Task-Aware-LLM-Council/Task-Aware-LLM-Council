[project]
name = "council-policies"
version = "0.1.1"
description = "P2, P3, and P4 orchestration policies for the LLM council"
readme = "README.md"
authors = [
	{	name = "Aniruth",	email = "aniruths10@gmail.com"	}, 
	{	name = "Om Ghag",	email = "oghag@usc.edu"	},
]
requires-python = ">=3.12"
dependencies = [
	"llm-gateway",
	"model-orchestration",
	"task-eval",
]

[project.optional-dependencies]
test = [
	"pytest>=8.3",
	"pytest-asyncio>=0.24", 
	"httpx>=0.27",
"datasets>=2.19",
]
p4-training = [
    "torch>=2.2",
    "sentence-transformers>=3.0",
]
p4-ml = [
    "torch>=2.2",
    "transformers>=4.52.4",
]


[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.uv.sources]
llm-gateway = {workspace = true}
model-orchestration = {workspace = true}
task-eval = {workspace = true}
benchmarking-pipeline = {workspace = true}

[build-system]
requires = ["uv_build>=0.9.1,<0.10.0"]
build-backend = "uv_build"
