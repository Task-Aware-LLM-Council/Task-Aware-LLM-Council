[project]
name = "model-orchestration"
version = "0.1.0"
description = "Provider-agnostic orchestration layer for small model councils"
readme = "README.md"
authors = [
    { name = "Bhaskar Mahajan", email = "bhaskarmahajan98@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "llm-gateway",
]

[project.optional-dependencies]
test = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
]

[project.scripts]
model-orchestration = "model_orchestration:main"

[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = [
    "unit: fast mocked tests for orchestration behavior",
]

[tool.uv.sources]
llm-gateway = { workspace = true }

[build-system]
requires = ["uv_build>=0.9.1,<0.10.0"]
build-backend = "uv_build"
