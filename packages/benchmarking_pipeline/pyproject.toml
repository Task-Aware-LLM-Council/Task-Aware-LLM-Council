[project]
name = "benchmarking-pipeline"
version = "0.1.0"
description = "Benchmark orchestration pipeline built on llm_gateway"
readme = "README.md"
authors = [
    { name = "Bhaskar Mahajan", email = "bhaskarmahajan98@gmail.com" }
]
requires-python = ">=3.14"
dependencies = [
    "llm-gateway",
]

[project.optional-dependencies]
test = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
]

[project.scripts]
benchmarking-pipeline = "benchmarking_pipeline:main"

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.uv.sources]
llm-gateway = { workspace = true }

[build-system]
requires = ["uv_build>=0.9.1,<0.10.0"]
build-backend = "uv_build"
