[project]
name = "council-policies2"
version = "0.1.0"
description = "Fixed P2, P3, and P4 council policies — fully wired to the benchmark pipeline"
readme = "README.md"
authors = [
	{name = "Aniruth", email = "aniruths10@gmail.com"},
]
requires-python = ">=3.12"
dependencies = [
	"llm-gateway",
	"model-orchestration",
]

[project.optional-dependencies]
test = [
	"pytest>=8.3",
	"pytest-asyncio>=0.24",
	"httpx>=0.27",
]
p4-training = [
    "torch>=2.2",
    "sentence-transformers>=3.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.uv.sources]
llm-gateway = {workspace = true}
model-orchestration = {workspace = true}

[build-system]
requires = ["uv_build>=0.9.1,<0.10.0"]
build-backend = "uv_build"
